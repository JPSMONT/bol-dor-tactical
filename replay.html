<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a1628">
<title>Bol d'Or Mirabaud — Race Replay</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js" crossorigin=""></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a1628;--bg2:#0f2035;--bg3:#162a45;--card:#1a3355;
  --tx:#e8edf4;--tx2:#8fa4bd;--tx3:#5a7290;
  --acc:#4a9eff;--acc2:#2dd4a8;--warn:#f59e0b;--err:#ef4444;
}
html,body{height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}
body{display:flex;flex-direction:column}
a{color:var(--acc)}

#topBar{background:var(--bg2);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--bg3);z-index:1000}
#topBar h1{font-size:14px;font-weight:700;letter-spacing:.3px;color:var(--tx);white-space:nowrap}
#topBar .subtitle{font-size:11px;color:var(--tx3);margin-right:auto}
.year-row{display:flex;gap:4px}
.year-btn{padding:7px 14px;font-size:12px;font-weight:700;border:1px solid var(--bg3);background:transparent;color:var(--tx2);border-radius:6px;cursor:pointer;letter-spacing:.3px}
.year-btn:hover{background:var(--bg3);color:var(--tx)}
.year-btn.on{background:var(--acc);color:#000;border-color:var(--acc)}
.year-btn.loading{background:var(--warn);color:#000;border-color:var(--warn)}
#loadStatus{font-size:11px;color:var(--tx3);min-width:160px;text-align:right}
#loadStatus.error{color:#fca5a5}
#loadStatus.success{color:#6ee7b7}

#mapArea{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%;background:#000}
#map .leaflet-container{background:#000}
#map .leaflet-control-attribution{background:rgba(0,0,0,.7);color:var(--tx3);font-size:9px}
#map .leaflet-control-attribution a{color:var(--tx2)}
#map .leaflet-control-zoom a{background:var(--bg3);color:var(--tx);border-color:var(--bg2)}
#map .leaflet-control-zoom a:hover{background:var(--card)}

#legend{position:absolute;top:10px;right:10px;background:rgba(10,22,40,.88);border:1px solid var(--bg3);border-radius:8px;padding:8px 10px;z-index:500;font-size:10px;line-height:1.6;backdrop-filter:blur(4px)}
.legend-row{display:flex;align-items:center;gap:6px;color:var(--tx2);white-space:nowrap}
.legend-sw{width:14px;height:3px;border-radius:1px;flex-shrink:0}

#boatInfo{position:absolute;bottom:10px;left:10px;right:10px;max-width:520px;background:rgba(10,22,40,.94);border:1px solid var(--bg3);border-radius:8px;padding:10px 12px;z-index:500;font-size:12px;display:none;backdrop-filter:blur(8px)}
#boatInfo.show{display:block}
#boatInfo .bi-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
#boatInfo .bi-name{font-size:14px;font-weight:700}
#boatInfo .bi-sub{font-size:10px;color:var(--tx3);font-weight:500}
#boatInfo .bi-close{background:transparent;border:none;color:var(--tx3);font-size:16px;cursor:pointer;padding:0 4px;line-height:1}
#boatInfo .bi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-variant-numeric:tabular-nums}
#boatInfo .bi-k{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
#boatInfo .bi-v{font-size:13px;font-weight:700;color:var(--tx)}
@media(max-width:520px){#boatInfo .bi-grid{grid-template-columns:repeat(2,1fr)}}

#controls{background:var(--bg2);padding:10px 14px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--bg3);flex-wrap:wrap}
.ctrl-btn{background:var(--bg3);color:var(--tx);border:1px solid var(--bg3);font-size:13px;font-weight:700;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ctrl-btn:hover{background:var(--card)}
.ctrl-btn.playing{background:var(--acc);color:#000;border-color:var(--acc)}
#timeSlider{flex:1;min-width:120px;-webkit-appearance:none;appearance:none;height:6px;background:var(--bg);border-radius:3px;outline:none;accent-color:var(--acc)}
#timeSlider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--acc);cursor:pointer;border:2px solid var(--bg2)}
#timeSlider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--acc);cursor:pointer;border:2px solid var(--bg2)}
#timeDisplay{font-size:13px;font-weight:700;color:var(--acc);font-variant-numeric:tabular-nums;min-width:72px;text-align:center}
.speed-ctl{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx3)}
#speedSelect{background:var(--bg3);border:1px solid var(--bg3);color:var(--tx);padding:6px 8px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div id="topBar">
  <h1>Bol d'Or Mirabaud — Replay</h1>
  <span class="subtitle">SuiviRegate · 5 PRD targets highlighted</span>
  <div class="year-row">
    <button class="year-btn" data-race="BOL25">2025</button>
    <button class="year-btn" data-race="BOPM24">2024</button>
    <button class="year-btn" data-race="BOM23">2023</button>
    <button class="year-btn" data-race="BOM21">2021</button>
  </div>
  <span id="loadStatus">Tap a year to load tracks.</span>
</div>

<div id="mapArea">
  <div id="map"></div>
  <div id="legend"></div>
  <div id="boatInfo"></div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="playBtn" title="Play/pause" onclick="togglePlay()">&#9654;</button>
  <button class="ctrl-btn" id="stopBtn" title="Reset to start" onclick="resetPlay()">&#9632;</button>
  <input type="range" id="timeSlider" min="0" max="10000" value="0" oninput="onSliderChange(this.value)">
  <span id="timeDisplay">T+--:--</span>
  <div class="speed-ctl">
    <label>Speed</label>
    <select id="speedSelect" onchange="onSpeedChange(this.value)">
      <option value="10">10×</option>
      <option value="60">60×</option>
      <option value="300">300×</option>
      <option value="600" selected>600×</option>
      <option value="1800">1800×</option>
      <option value="3600">3600×</option>
    </select>
  </div>
</div>

<script>
// ===== Config (mirrors index.html — PRD §4.1) =====
var RIVAL_TARGETS = [
  {key:'leone',     skipper:'Leone',     sailNo:'FRA 15710', boat:'747 One Design', tcf:1.039, kmName:'illico Ti Vitti team', color:'#ef4444'},
  {key:'pertuiset', skipper:'Pertuiset', sailNo:'SUI 076',   boat:'Esse 850',       tcf:1.113, kmName:'Darnetal',             color:'#fbbf24'},
  {key:'monachon',  skipper:'Monachon',  sailNo:'SUI 9',     boat:'6.5m SI',        tcf:0.976, kmName:'Ondine',               color:'#2dd4a8'},
  {key:'rottet',    skipper:'Rottet',    sailNo:'SUI 140',   boat:'Esse 850',       tcf:1.087, kmName:'Storm',                color:'#a78bfa'},
  {key:'borter',    skipper:'Borter',    sailNo:'SUI 102',   boat:'Grand Surprise', tcf:1.112, kmName:'Little Nemo II',       color:'#60a5fa'}
];
var RACE_LABELS = {BOL25:'2025', BOPM24:'2024', BOM23:'2023', BOM21:'2021'};
var BOUVERET = [46.391, 6.857];
var LAKE = [[46.207,6.148],[46.215,6.175],[46.240,6.194],[46.265,6.197],[46.281,6.225],[46.304,6.242],[46.352,6.281],[46.366,6.308],[46.370,6.338],[46.340,6.388],[46.360,6.413],[46.366,6.446],[46.375,6.475],[46.405,6.513],[46.396,6.553],[46.401,6.594],[46.405,6.649],[46.408,6.688],[46.408,6.727],[46.399,6.768],[46.394,6.806],[46.388,6.830],[46.386,6.836],[46.395,6.860],[46.396,6.884],[46.396,6.908],[46.394,6.919],[46.397,6.924],[46.415,6.928],[46.436,6.908],[46.451,6.855],[46.459,6.839],[46.468,6.823],[46.474,6.788],[46.486,6.729],[46.491,6.714],[46.497,6.703],[46.504,6.656],[46.511,6.613],[46.507,6.553],[46.515,6.520],[46.503,6.492],[46.491,6.478],[46.476,6.450],[46.465,6.384],[46.453,6.337],[46.433,6.310],[46.406,6.283],[46.388,6.248],[46.369,6.230],[46.345,6.214],[46.336,6.204],[46.308,6.184],[46.282,6.167],[46.263,6.166],[46.252,6.153],[46.235,6.153],[46.228,6.150],[46.210,6.151],[46.207,6.148]];

// ===== Helpers =====
function haversineNM(lat1, lon1, lat2, lon2) {
  var R = 3440.065, toR = Math.PI/180;
  var dLat = (lat2-lat1)*toR, dLon = (lon2-lon1)*toR;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*toR)*Math.cos(lat2*toR)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return 2*R*Math.asin(Math.min(1, Math.sqrt(a)));
}
function bearingDeg(lat1, lon1, lat2, lon2) {
  var toR = Math.PI/180;
  var dLon = (lon2-lon1)*toR;
  var y = Math.sin(dLon)*Math.cos(lat2*toR);
  var x = Math.cos(lat1*toR)*Math.sin(lat2*toR) - Math.sin(lat1*toR)*Math.cos(lat2*toR)*Math.cos(dLon);
  return (Math.atan2(y, x)*180/Math.PI + 360) % 360;
}
function windDirName(deg) {
  var dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg/22.5) % 16];
}
function findRivalForName(name) {
  if(!name) return null;
  var lower = name.toLowerCase();
  for(var i=0; i<RIVAL_TARGETS.length; i++){
    var km = RIVAL_TARGETS[i].kmName.toLowerCase();
    if(lower === km || lower.indexOf(km) !== -1) return RIVAL_TARGETS[i];
  }
  return null;
}

// ===== SuiviRegate KMZ loader (no CORS on www.suiviregate.ch — proxy fallback) =====
var SUIVIREGATE_BASE = 'https://www.suiviregate.ch/sync/';
var CORS_PROXIES = [
  function(u){ return 'https://corsproxy.io/?' + encodeURIComponent(u); },
  function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); }
];
function fetchKmzWithFallback(url) {
  return fetch(url).then(function(r){
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return r.blob();
  }).catch(function(directErr){
    var attempt = function(idx){
      if(idx >= CORS_PROXIES.length) throw new Error(directErr.message + ' (CORS proxies also failed)');
      return fetch(CORS_PROXIES[idx](url)).then(function(r){
        if(!r.ok) throw new Error('proxy HTTP ' + r.status);
        return r.blob();
      }).catch(function(){ return attempt(idx+1); });
    };
    setStatus('Direct fetch blocked (CORS); trying proxy…', null);
    return attempt(0);
  });
}
function parseKmlString(text) {
  var doc = new DOMParser().parseFromString(text, 'application/xml');
  if(doc.getElementsByTagName('parsererror').length) throw new Error('KML parse error');
  var placemarks = doc.getElementsByTagName('Placemark');
  var boats = [];
  for(var i=0; i<placemarks.length; i++){
    var pm = placemarks[i];
    var nameNode = pm.getElementsByTagName('name')[0];
    var name = nameNode ? (nameNode.textContent || '').trim() : null;
    if(!name) continue;
    var tracks = pm.getElementsByTagNameNS('*', 'Track');
    if(!tracks.length) { tracks = pm.getElementsByTagName('gx:Track'); if(!tracks.length) continue; }
    var track = tracks[0];
    var whens = track.getElementsByTagNameNS('*', 'when');
    if(!whens.length) whens = track.getElementsByTagName('when');
    var coords = track.getElementsByTagNameNS('*', 'coord');
    if(!coords.length) coords = track.getElementsByTagName('gx:coord');
    var n = Math.min(whens.length, coords.length);
    if(n < 2) continue;
    var pts = [];
    for(var k=0; k<n; k++){
      var parts = (coords[k].textContent || '').trim().split(/\s+/);
      var lon = parseFloat(parts[0]), lat = parseFloat(parts[1]);
      if(isNaN(lat) || isNaN(lon)) continue;
      var ts = whens[k] && whens[k].textContent ? Date.parse(whens[k].textContent) : null;
      pts.push({ts: ts, lat: lat, lon: lon});
    }
    if(pts.length > 1) boats.push({name: name, points: pts});
  }
  return boats;
}
function loadRaceKmz(raceCode) {
  return fetchKmzWithFallback(SUIVIREGATE_BASE + raceCode + '/kml/data.kmz')
    .then(function(blob){
      setStatus('Decompressing (' + Math.round(blob.size/1024) + ' KB)…');
      return JSZip.loadAsync(blob);
    })
    .then(function(zip){
      var kmlName = Object.keys(zip.files).find(function(n){ return /\.kml$/i.test(n); });
      if(!kmlName) throw new Error('No KML in archive');
      setStatus('Parsing ' + kmlName + '…');
      return zip.files[kmlName].async('text');
    })
    .then(parseKmlString);
}

// ===== Map =====
var map = null;
var bgLayer = null, targetLayer = null, animLayer = null;

function initMap() {
  if(map) return;
  map = L.map('map', {zoomControl:true, attributionControl:true, preferCanvas:true});
  L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; <a href="https://www.openseamap.org">OpenSeaMap</a> · tracks &copy; <a href="https://www.suiviregate.ch">SuiviRegate</a>'
  }).addTo(map);
  L.polygon(LAKE, {color:'#4a9eff', weight:1.5, opacity:0.85, fillColor:'#0a1628', fillOpacity:0.6, interactive:false}).addTo(map);
  bgLayer = L.layerGroup().addTo(map);
  targetLayer = L.layerGroup().addTo(map);
  animLayer = L.layerGroup().addTo(map);
  map.fitBounds([[46.195, 6.13], [46.52, 6.95]], {padding:[10,10]});
  renderLegend();
}

function renderLegend() {
  var el = document.getElementById('legend');
  var html = '';
  RIVAL_TARGETS.forEach(function(t){
    html += '<div class="legend-row"><span class="legend-sw" style="background:'+t.color+'"></span>'+t.skipper+'</div>';
  });
  html += '<div class="legend-row"><span class="legend-sw" style="background:#4a9eff;opacity:.5"></span>Fleet</div>';
  el.innerHTML = html;
}

// ===== State =====
var currentBoats = [];
var currentTargets = [];     // [{target, boat, marker}]
var currentYear = null;
var minTs = null, maxTs = null;
var playing = false;
var animSpeed = 600;
var animRaf = null;
var animLastTs = 0;
var selectedBoatName = null;

function setStatus(msg, kind) {
  var el = document.getElementById('loadStatus');
  if(!el) return;
  el.textContent = msg;
  el.className = kind || '';
}
function setYearButton(raceCode, state) {
  document.querySelectorAll('.year-btn').forEach(function(b){
    b.classList.remove('on','loading');
    if(b.dataset.race === raceCode) b.classList.add(state || 'on');
  });
}

// ===== Render tracks =====
function renderTracks(boats) {
  if(!map) initMap();
  bgLayer.clearLayers();
  targetLayer.clearLayers();
  animLayer.clearLayers();
  currentTargets = [];
  // Background fleet
  boats.forEach(function(b){
    if(findRivalForName(b.name)) return;
    var coords = b.points.map(function(p){ return [p.lat, p.lon]; });
    if(coords.length < 2) return;
    L.polyline(coords, {color:'#4a9eff', weight:0.7, opacity:0.16, smoothFactor:2, interactive:false}).addTo(bgLayer);
  });
  // Targets on top + register for animation
  boats.forEach(function(b){
    var rival = findRivalForName(b.name);
    if(!rival) return;
    var coords = b.points.map(function(p){ return [p.lat, p.lon]; });
    if(coords.length < 2) return;
    L.polyline(coords, {color:rival.color, weight:2.5, opacity:0.9, smoothFactor:1.5}).addTo(targetLayer);
    currentTargets.push({target:rival, boat:b, marker:null});
  });
}

// ===== Animation =====
function setupTime(boats) {
  minTs = Infinity; maxTs = -Infinity;
  boats.forEach(function(b){
    if(!findRivalForName(b.name)) return;
    b.points.forEach(function(p){
      if(!p.ts) return;
      if(p.ts < minTs) minTs = p.ts;
      if(p.ts > maxTs) maxTs = p.ts;
    });
  });
  if(!isFinite(minTs) || !isFinite(maxTs) || maxTs <= minTs) { minTs = maxTs = null; return false; }
  var slider = document.getElementById('timeSlider');
  slider.value = 0;
  drawAnimAt(minTs);
  return true;
}

function tsAtSlider(v) {
  if(minTs == null) return null;
  var f = (+v || 0) / 10000;
  return minTs + f * (maxTs - minTs);
}

function interpolateAt(boat, ts) {
  var p = boat.points;
  if(!p.length) return null;
  if(ts <= p[0].ts) return null;
  if(ts >= p[p.length-1].ts) return null;
  for(var i=0; i<p.length-1; i++){
    if(p[i].ts <= ts && p[i+1].ts > ts) {
      var f = (ts - p[i].ts) / (p[i+1].ts - p[i].ts);
      return {
        lat: p[i].lat + f*(p[i+1].lat - p[i].lat),
        lon: p[i].lon + f*(p[i+1].lon - p[i].lon),
        idx: i
      };
    }
  }
  return null;
}

function drawAnimAt(ts) {
  if(!animLayer || ts == null) return;
  animLayer.clearLayers();
  currentTargets.forEach(function(ct){
    var pos = interpolateAt(ct.boat, ts);
    if(!pos) { ct.marker = null; return; }
    var html = '<div style="width:18px;height:18px;border-radius:50%;background:'+ct.target.color+';border:2.5px solid #fff;box-shadow:0 0 0 1px #0a1628,0 0 8px '+ct.target.color+'80;cursor:pointer"></div>';
    var icon = L.divIcon({className:'', html:html, iconSize:[22,22], iconAnchor:[11,11]});
    var m = L.marker([pos.lat, pos.lon], {icon:icon, zIndexOffset:1000});
    m.on('click', function(){ selectBoat(ct, pos, ts, false); });
    m.addTo(animLayer);
    ct.marker = m;
  });
  // Time display
  var elapsed = ts - minTs;
  var totalMin = Math.max(0, Math.floor(elapsed/60000));
  var h = Math.floor(totalMin/60), mm = totalMin % 60;
  document.getElementById('timeDisplay').textContent = 'T+' + String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
  // Keep info card live for selected boat
  if(selectedBoatName) {
    var ct = currentTargets.find(function(x){ return x.boat.name === selectedBoatName; });
    if(ct) {
      var pos2 = interpolateAt(ct.boat, ts);
      if(pos2) selectBoat(ct, pos2, ts, true);
    }
  }
}

function onSliderChange(v) { drawAnimAt(tsAtSlider(v)); }

function togglePlay() {
  if(playing) {
    playing = false;
    if(animRaf) { cancelAnimationFrame(animRaf); animRaf = null; }
    var pb = document.getElementById('playBtn');
    pb.innerHTML = '&#9654;';
    pb.classList.remove('playing');
  } else {
    if(minTs == null) return;
    playing = true;
    var pb = document.getElementById('playBtn');
    pb.innerHTML = '&#10073;&#10073;';
    pb.classList.add('playing');
    animLastTs = performance.now();
    animRaf = requestAnimationFrame(animLoop);
  }
}

function animLoop() {
  if(!playing) return;
  var now = performance.now();
  var dt = now - animLastTs;
  animLastTs = now;
  var slider = document.getElementById('timeSlider');
  var maxSlider = +slider.max;
  var virtualMs = dt * animSpeed;
  var inc = (virtualMs / (maxTs - minTs)) * maxSlider;
  var v = Math.min(maxSlider, (+slider.value || 0) + inc);
  slider.value = v;
  drawAnimAt(tsAtSlider(v));
  if(v >= maxSlider) { togglePlay(); return; }
  animRaf = requestAnimationFrame(animLoop);
}

function resetPlay() {
  if(playing) togglePlay();
  document.getElementById('timeSlider').value = 0;
  if(minTs != null) drawAnimAt(minTs);
  selectedBoatName = null;
  document.getElementById('boatInfo').classList.remove('show');
}

function onSpeedChange(v) { animSpeed = +v || 1; }

// ===== Boat selection / info panel =====
function selectBoat(ct, pos, ts, isRefresh) {
  selectedBoatName = ct.boat.name;
  var pts = ct.boat.points, idx = pos.idx;
  var prev = pts[Math.max(0, idx-1)], next = pts[Math.min(pts.length-1, idx+1)];
  var seg = haversineNM(prev.lat, prev.lon, next.lat, next.lon);
  var dtH = (next.ts && prev.ts) ? (next.ts - prev.ts) / 3600000 : 0;
  var sog = dtH > 0 ? seg / dtH : 0;
  var hdg = bearingDeg(prev.lat, prev.lon, next.lat, next.lon);
  var distBVT = haversineNM(pos.lat, pos.lon, BOUVERET[0], BOUVERET[1]);
  var brgBVT = bearingDeg(pos.lat, pos.lon, BOUVERET[0], BOUVERET[1]);
  var info = document.getElementById('boatInfo');
  info.innerHTML = '<div class="bi-head">' +
    '<div><span class="bi-name" style="color:'+ct.target.color+'">'+ct.target.skipper+'</span> <span class="bi-sub">· '+ct.boat.name+' · '+ct.target.boat+' · '+ct.target.sailNo+' · TCF '+ct.target.tcf.toFixed(3)+'</span></div>' +
    '<button class="bi-close" onclick="clearSelection()" title="Close">×</button>' +
    '</div>' +
    '<div class="bi-grid">' +
      '<div><div class="bi-k">SOG</div><div class="bi-v">'+sog.toFixed(1)+' kn</div></div>' +
      '<div><div class="bi-k">HDG</div><div class="bi-v">'+Math.round(hdg)+'° '+windDirName(hdg)+'</div></div>' +
      '<div><div class="bi-k">To Bouveret</div><div class="bi-v">'+distBVT.toFixed(1)+' NM</div></div>' +
      '<div><div class="bi-k">Brg to BVT</div><div class="bi-v">'+Math.round(brgBVT)+'° '+windDirName(brgBVT)+'</div></div>' +
      '<div><div class="bi-k">Position</div><div class="bi-v" style="font-size:11px">'+pos.lat.toFixed(4)+', '+pos.lon.toFixed(4)+'</div></div>' +
      '<div><div class="bi-k">Race time</div><div class="bi-v">'+document.getElementById('timeDisplay').textContent+'</div></div>' +
    '</div>';
  info.classList.add('show');
  if(!isRefresh) map.panTo([pos.lat, pos.lon], {animate:true, duration:0.4});
}

function clearSelection() {
  selectedBoatName = null;
  document.getElementById('boatInfo').classList.remove('show');
}

// ===== Year selector =====
function loadYear(raceCode) {
  if(!raceCode) return;
  initMap();
  currentYear = raceCode;
  setYearButton(raceCode, 'loading');
  resetPlay();
  setStatus('Fetching ' + RACE_LABELS[raceCode] + ' KMZ…');
  loadRaceKmz(raceCode).then(function(boats){
    currentBoats = boats;
    renderTracks(boats);
    if(setupTime(boats)) {
      var found = 0; boats.forEach(function(b){ if(findRivalForName(b.name)) found++; });
      setStatus(boats.length + ' boats · ' + found + ' targets · scrub or play', 'success');
      // Fit to target tracks
      var bounds = null;
      boats.forEach(function(b){
        if(!findRivalForName(b.name)) return;
        var c = b.points.map(function(p){ return [p.lat, p.lon]; });
        if(!c.length) return;
        if(!bounds) bounds = L.latLngBounds(c); else bounds.extend(L.latLngBounds(c));
      });
      if(bounds) map.fitBounds(bounds, {padding:[40,40]});
    } else {
      setStatus(boats.length + ' boats loaded, no timestamps for animation', 'error');
    }
    setYearButton(raceCode, 'on');
  }).catch(function(err){
    setStatus('Failed: ' + err.message, 'error');
    setYearButton(raceCode, 'on');
  });
}

// Wire year buttons
document.querySelectorAll('.year-btn').forEach(function(b){
  b.addEventListener('click', function(){ loadYear(b.dataset.race); });
});

// Init + auto-load BOL25
initMap();
loadYear('BOL25');
</script>
