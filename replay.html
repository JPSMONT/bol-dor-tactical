const BOAT_COLORS = [
  '#ff6b6b','#4ecdc4','#45b7d1','#f9ca24','#a29bfe',
  '#fd79a8','#00b894','#e17055','#6c5ce7','#74b9ff'
];

// ========== STATE ==========
let currentYear = '2025';
let playing = false;
let currentTimeMin = 0;
let maxTimeMin = 1800; // 30 hours
let playSpeed = 1;
let animFrame = null;
let lastFrameTime = 0;
let selectedBoat = null;

// Pan/zoom state
let viewBox = {x:0,y:0,w:1000,h:500};
let defaultVB = {x:0,y:0,w:1000,h:500};
let isPanning = false;
let panStart = {x:0,y:0};
let panVBStart = {x:0,y:0};
let zoomLevel = 1;

// Touch state
let lastTouchDist = 0;
let lastTouchCenter = {x:0,y:0};

// Wind cache
const windCache = {};

// ========== COORDINATE PROJECTION ==========
// Mercator-like projection for the lake
const LAT_MIN = 46.195, LAT_MAX = 46.525;
const LON_MIN = 6.13, LON_MAX = 6.94;
const MAP_W = 1000, MAP_H = 500;

function latLonToXY(lat, lon) {
  const x = (lon - LON_MIN) / (LON_MAX - LON_MIN) * MAP_W;
  const y = (1 - (lat - LAT_MIN) / (LAT_MAX - LAT_MIN)) * MAP_H;
  return {x, y};
}

// ========== SVG HELPERS ==========
const SVG_NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('mapSvg');

function svgEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  return el;
}

// ========== INIT MAP ==========
function initMap() {
  svg.innerHTML = '';
  svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);

  // Defs
  const defs = svgEl('defs');

  // Lake gradient
  const grad = svgEl('linearGradient', {id:'lakeGrad',x1:'0%',y1:'0%',x2:'100%',y2:'100%'});
  const s1 = svgEl('stop',{offset:'0%','stop-color':'#0d2847'});
  const s2 = svgEl('stop',{offset:'100%','stop-color':'#0a1e3d'});
  grad.appendChild(s1); grad.appendChild(s2);
  defs.appendChild(grad);

  // Glow filter
  const filt = svgEl('filter',{id:'glow',x:'-50%',y:'-50%',width:'200%',height:'200%'});
  const gb = svgEl('feGaussianBlur',{stdDeviation:'2',result:'blur'});
  const merge = svgEl('feMerge');
  const mn1 = svgEl('feMergeNode',{in:'blur'});
  const mn2 = svgEl('feMergeNode',{in:'SourceGraphic'});
  merge.appendChild(mn1); merge.appendChild(mn2);
  filt.appendChild(gb); filt.appendChild(merge);
  defs.appendChild(filt);

  svg.appendChild(defs);

  // Background
  const bg = svgEl('rect',{x:viewBox.x-100,y:viewBox.y-100,width:MAP_W+200,height:MAP_H+200,fill:'#0a1628'});
  svg.appendChild(bg);

  // Lake polygon
  const lakePoints = LAKE_POLYGON.map(([lat,lon]) => {
    const p = latLonToXY(lat,lon);
    return `${p.x},${p.y}`;
  }).join(' ');
  const lake = svgEl('polygon',{points:lakePoints,fill:'url(#lakeGrad)',stroke:'#1a4a7a',
    'stroke-width':'1.5','stroke-linejoin':'round'});
  svg.appendChild(lake);

  // City labels
  CITIES.forEach(city => {
    const p = latLonToXY(city.lat, city.lon);
    const dot = svgEl('circle',{cx:p.x,cy:p.y,r:2.5,fill:'#5a7ea0'});
    svg.appendChild(dot);
    const label = svgEl('text',{x:p.x+4,y:p.y-4,fill:'#5a7ea0','font-size':'8',
      'font-family':'sans-serif','pointer-events':'none'});
    label.textContent = city.name;
    svg.appendChild(label);
  });

  // Start/finish line at Geneva
  const gStart = latLonToXY(46.207, 6.155);
  const gEnd = latLonToXY(46.215, 6.155);
  const startLine = svgEl('line',{x1:gStart.x,y1:gStart.y,x2:gEnd.x,y2:gEnd.y,
    stroke:'#ff4444','stroke-width':'2','stroke-dasharray':'4,2',opacity:'0.8'});
  svg.appendChild(startLine);
  const sfLabel = svgEl('text',{x:gStart.x-30,y:gStart.y+3,fill:'#ff4444','font-size':'6',
    'font-family':'sans-serif','pointer-events':'none'});
  sfLabel.textContent = 'START/FINISH';
  svg.appendChild(sfLabel);

  // Le Bouveret mark
  const bMark = latLonToXY(46.393, 6.857);
  const mark = svgEl('polygon',{
    points:`${bMark.x},${bMark.y-6} ${bMark.x-4},${bMark.y+4} ${bMark.x+4},${bMark.y+4}`,
    fill:'none',stroke:'#f9ca24','stroke-width':'1.5'});
  svg.appendChild(mark);
  const mLabel = svgEl('text',{x:bMark.x+6,y:bMark.y,fill:'#f9ca24','font-size':'6',
    'font-family':'sans-serif','pointer-events':'none'});
  mLabel.textContent = 'MARK';
  svg.appendChild(mLabel);

  // Wind arrows group
  const windG = svgEl('g',{id:'windGroup'});
  svg.appendChild(windG);

  // Trail group
  const trailG = svgEl('g',{id:'trailGroup'});
  svg.appendChild(trailG);

  // Boat group
  const boatG = svgEl('g',{id:'boatGroup'});
  svg.appendChild(boatG);

  updateViewBox();
}

function updateViewBox() {
  svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
  const z = (MAP_W / viewBox.w).toFixed(1);
  zoomLevel = parseFloat(z);
  document.getElementById('zoomIndicator').textContent = z + 'x';
}

function resetZoom() {
  viewBox = {...defaultVB};
  updateViewBox();
}

// ========== PAN/ZOOM ==========
const mapArea = document.getElementById('mapArea');

mapArea.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width;
  const my = (e.clientY - rect.top) / rect.height;

  const factor = e.deltaY > 0 ? 1.15 : 0.87;
  const newW = Math.max(50, Math.min(MAP_W * 1.5, viewBox.w * factor));
  const newH = Math.max(25, Math.min(MAP_H * 1.5, viewBox.h * factor));

  viewBox.x += (viewBox.w - newW) * mx;
  viewBox.y += (viewBox.h - newH) * my;
  viewBox.w = newW;
  viewBox.h = newH;
  updateViewBox();
}, {passive: false});

mapArea.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isPanning = true;
  panStart = {x: e.clientX, y: e.clientY};
  panVBStart = {x: viewBox.x, y: viewBox.y};
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  const rect = svg.getBoundingClientRect();
  const dx = (e.clientX - panStart.x) / rect.width * viewBox.w;
  const dy = (e.clientY - panStart.y) / rect.height * viewBox.h;
  viewBox.x = panVBStart.x - dx;
  viewBox.y = panVBStart.y - dy;
  updateViewBox();
});
window.addEventListener('mouseup', () => { isPanning = false; });

mapArea.addEventListener('dblclick', e => {
  e.preventDefault();
  resetZoom();
});

// Touch handlers
mapArea.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isPanning = true;
    panStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    panVBStart = {x: viewBox.x, y: viewBox.y};
  } else if (e.touches.length === 2) {
    isPanning = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
    lastTouchCenter = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
  }
}, {passive: true});

mapArea.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isPanning) {
    const rect = svg.getBoundingClientRect();
    const dx = (e.touches[0].clientX - panStart.x) / rect.width * viewBox.w;
    const dy = (e.touches[0].clientY - panStart.y) / rect.height * viewBox.h;
    viewBox.x = panVBStart.x - dx;
    viewBox.y = panVBStart.y - dy;
    updateViewBox();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastTouchDist > 0) {
      const factor = lastTouchDist / dist;
      const rect = svg.getBoundingClientRect();
      const cx = (lastTouchCenter.x - rect.left) / rect.width;
      const cy = (lastTouchCenter.y - rect.top) / rect.height;
      const newW = Math.max(50, Math.min(MAP_W * 1.5, viewBox.w * factor));
      const newH = Math.max(25, Math.min(MAP_H * 1.5, viewBox.h * factor));
      viewBox.x += (viewBox.w - newW) * cx;
      viewBox.y += (viewBox.h - newH) * cy;
      viewBox.w = newW;
      viewBox.h = newH;
      updateViewBox();
    }
    lastTouchDist = dist;
    lastTouchCenter = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
  }
}, {passive: false});

mapArea.addEventListener('touchend', e => {
  isPanning = false;
  lastTouchDist = 0;
  // double-tap detection
  if (e.changedTouches.length === 1) {
    const now = Date.now();
    if (mapArea._lastTap && now - mapArea._lastTap < 300) {
      resetZoom();
      mapArea._lastTap = 0;
    } else {
      mapArea._lastTap = now;
    }
  }
});

// ========== BOAT INTERPOLATION ==========
function getBoatPos(points, timeMin) {
  if (timeMin <= points[0][0]) return {lat:points[0][1],lon:points[0][2],hdg:points[0][3],active:timeMin>=0};
  const lastPt = points[points.length-1];
  if (timeMin >= lastPt[0]) return {lat:lastPt[1],lon:lastPt[2],hdg:lastPt[3],active:false,finished:true};

  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i], b = points[i+1];
    if (timeMin >= a[0] && timeMin <= b[0]) {
      const t = (timeMin - a[0]) / (b[0] - a[0]);
      return {
        lat: a[1] + (b[1]-a[1]) * t,
        lon: a[2] + (b[2]-a[2]) * t,
        hdg: a[3] + (b[3]-a[3]) * t,
        speed: calcSpeed(a, b),
        active: true
      };
    }
  }
  return {lat:lastPt[1],lon:lastPt[2],hdg:lastPt[3],active:false,finished:true};
}

function calcSpeed(a, b) {
  const dlat = b[1]-a[1], dlon = b[2]-a[2];
  const dist = Math.sqrt(dlat*dlat + dlon*dlon) * 60; // ~nm
  const dt = (b[0]-a[0]) / 60; // hours
  return dt > 0 ? (dist / dt).toFixed(1) : 0;
}

// ========== WIND DATA ==========
async function fetchWindData(year) {
  if (windCache[year]) {
    document.getElementById('windStatus').textContent = 'Wind: cached';
    return;
  }
  document.getElementById('windStatus').textContent = 'Loading wind...';

  const dateStr = RACE_DATES[year];
  const d = new Date(dateStr);
  const end = new Date(d);
  end.setDate(end.getDate() + 1);
  const endStr = end.toISOString().slice(0,10);

  const results = {};
  const promises = WIND_GRID.map(async pt => {
    try {
      const url = `https://historical-forecast-api.open-meteo.com/v1/forecast?latitude=${pt.lat}&longitude=${pt.lon}&start_date=${dateStr}&end_date=${endStr}&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m&wind_speed_unit=kn&models=meteofrance_arome_france_hd`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(resp.status);
      const data = await resp.json();
      results[pt.id] = data.hourly;
    } catch(e) {
      console.warn('Wind fetch failed for', pt.id, e);
      results[pt.id] = null;
    }
  });

  await Promise.all(promises);
  windCache[year] = results;
  document.getElementById('windStatus').textContent = 'Wind: loaded';
}

function getWindAtPoint(ptId, timeMin) {
  const data = windCache[currentYear]?.[ptId];
  if (!data || !data.time) return null;

  // timeMin=0 is race start; wind data starts at midnight UTC on race day
  // Bol d'Or 2026 starts at 10:00 CEST (UTC+2) = 08:00 UTC = 480 min from midnight UTC
  const offsetMin = 480;
  const totalMin = offsetMin + timeMin;
  const hourIdx = totalMin / 60;
  const lo = Math.floor(hourIdx);
  const hi = Math.min(lo + 1, (data.time?.length || 1) - 1);
  const frac = hourIdx - lo;

  if (lo < 0 || lo >= (data.time?.length || 0)) return null;

  const ws = data.wind_speed_10m;
  const wd = data.wind_direction_10m;
  const wg = data.wind_gusts_10m;

  if (!ws || lo >= ws.length) return null;

  const speed = ws[lo] + (ws[hi] - ws[lo]) * frac;
  // Interpolate direction carefully (circular)
  let d1 = wd[lo], d2 = wd[hi];
  let dd = d2 - d1;
  if (dd > 180) dd -= 360;
  if (dd < -180) dd += 360;
  const dir = (d1 + dd * frac + 360) % 360;
  const gust = wg ? wg[lo] + (wg[hi] - wg[lo]) * frac : speed;

  return {speed: speed, dir: dir, gust: gust};
}

function getWindFromEmbedded(timeMin) {
  // Fall back to embedded race wind readings
  const readings = RACE_DATA[currentYear]?.r;
  if (!readings) return null;

  // Each reading is 3h apart starting at 00:00 day1
  // Bol d'Or 2026 starts at 10:00 local (CEST) = 600 min from midnight local
  const raceOffsetMin = 600;
  const totalMin = raceOffsetMin + timeMin;
  const readingIdx = totalMin / 180; // 3h = 180min
  const lo = Math.max(0, Math.min(Math.floor(readingIdx), readings.length - 1));
  const hi = Math.min(lo + 1, readings.length - 1);
  const frac = readingIdx - lo;

  const s1 = readings[lo][1], s2 = readings[hi][1];
  const speed = s1 + (s2 - s1) * frac;
  let d1 = readings[lo][2], d2 = readings[hi][2];
  let dd = d2 - d1;
  if (dd > 180) dd -= 360;
  if (dd < -180) dd += 360;
  const dir = (d1 + dd * frac + 360) % 360;

  return {speed, dir, gust: speed * 1.2};
}

// ========== WIND COLOR ==========
function windColor(speed) {
  if (speed < 6) return '#00b894';
  if (speed < 12) return '#0984e3';
  if (speed < 18) return '#6c5ce7';
  if (speed < 25) return '#e17055';
  return '#d63031';
}

// ========== RENDER ==========
function renderFrame() {
  const boatG = document.getElementById('boatGroup');
  const trailG = document.getElementById('trailGroup');
  const windG = document.getElementById('windGroup');
  if (!boatG) return;

  boatG.innerHTML = '';
  trailG.innerHTML = '';
  windG.innerHTML = '';

  const yearData = RACE_DATA[currentYear];
  if (!yearData) return;

  const boats = yearData.b;
  const keys = Object.keys(boats);

  // Calculate max time for this year
  let mt = 0;
  keys.forEach(k => {
    const pts = boats[k].p;
    const last = pts[pts.length - 1][0];
    if (last > mt) mt = last;
  });
  maxTimeMin = mt + 30;
  document.getElementById('timeSlider').max = Math.round(maxTimeMin);

  // Render wind arrows
  const showLabels = zoomLevel > 1.8;
  WIND_GRID.forEach(pt => {
    let wind = getWindAtPoint(pt.id, currentTimeMin);
    if (!wind) {
      // Use embedded data as fallback with some spatial variation
      wind = getWindFromEmbedded(currentTimeMin);
      if (!wind) return;
      // Add slight random variation per point for visual interest
      const hash = pt.lat * 100 + pt.lon * 10;
      wind.speed *= (0.8 + (hash % 5) * 0.1);
      wind.dir = (wind.dir + (hash % 30) - 15 + 360) % 360;
    }

    const pos = latLonToXY(pt.lat, pt.lon);
    const len = Math.min(20, 4 + wind.speed * 0.8);
    const rad = (wind.dir - 90) * Math.PI / 180; // wind FROM direction
    // Arrow points in direction wind is blowing TO (opposite of FROM)
    const toRad = rad + Math.PI;
    const ex = pos.x + Math.cos(toRad) * len;
    const ey = pos.y + Math.sin(toRad) * len;
    const col = windColor(wind.speed);

    // Arrow shaft
    const line = svgEl('line',{x1:pos.x,y1:pos.y,x2:ex,y2:ey,stroke:col,
      'stroke-width':'1.5',opacity:'0.7'});
    windG.appendChild(line);

    // Arrow head
    const headLen = 4;
    const ha1 = toRad + 2.6;
    const ha2 = toRad - 2.6;
    const hx1 = ex + Math.cos(ha1) * headLen;
    const hy1 = ey + Math.sin(ha1) * headLen;
    const hx2 = ex + Math.cos(ha2) * headLen;
    const hy2 = ey + Math.sin(ha2) * headLen;
    const head = svgEl('polygon',{
      points:`${ex},${ey} ${hx1},${hy1} ${hx2},${hy2}`,
      fill:col,opacity:'0.7'});
    windG.appendChild(head);

    // Clickable area
    const hitArea = svgEl('circle',{cx:pos.x,cy:pos.y,r:8,fill:'transparent',cursor:'pointer'});
    hitArea.addEventListener('click', () => {
      showWindInfo(pt, wind);
    });
    hitArea.addEventListener('mouseover', () => {
      showWindInfo(pt, wind);
    });
    windG.appendChild(hitArea);

    // Speed label when zoomed
    if (showLabels) {
      const lbl = svgEl('text',{x:pos.x+3,y:pos.y-4,fill:col,'font-size':'5',
        'font-family':'sans-serif',opacity:'0.9','pointer-events':'none'});
      lbl.textContent = wind.speed.toFixed(1) + 'kn';
      windG.appendChild(lbl);
    }
  });

  // Render boats
  let positions = [];
  keys.forEach((sk, i) => {
    const b = boats[sk];
    const color = BOAT_COLORS[i % BOAT_COLORS.length];
    const pos = getBoatPos(b.p, currentTimeMin);

    if (!pos) return;
    positions.push({sk, pos, b, color, idx: i});

    // Trail (show last N points)
    const trailPts = [];
    for (let t = Math.max(0, currentTimeMin - 120); t <= currentTimeMin; t += 3) {
      const tp = getBoatPos(b.p, t);
      if (tp && tp.active) {
        const pp = latLonToXY(tp.lat, tp.lon);
        trailPts.push(pp);
      }
    }
    if (trailPts.length > 1) {
      const pathD = trailPts.map((p, j) => (j === 0 ? 'M' : 'L') + p.x + ',' + p.y).join(' ');
      const trail = svgEl('path',{d:pathD,fill:'none',stroke:color,
        'stroke-width':'1',opacity:'0.3','stroke-linecap':'round'});
      trailG.appendChild(trail);
    }

    if (pos.active || (pos.finished && currentTimeMin <= b.p[b.p.length-1][0] + 10)) {
      const pp = latLonToXY(pos.lat, pos.lon);
      const isSelected = selectedBoat === sk;
      const r = isSelected ? 5 : 3.5;

      // Glow for selected
      if (isSelected) {
        const glow = svgEl('circle',{cx:pp.x,cy:pp.y,r:8,fill:color,opacity:'0.2'});
        boatG.appendChild(glow);
      }

      // Boat dot
      const dot = svgEl('circle',{cx:pp.x,cy:pp.y,r:r,fill:color,stroke:'#fff',
        'stroke-width':'0.5',cursor:'pointer',filter:isSelected?'url(#glow)':''});
      dot.addEventListener('click', () => {
        selectedBoat = sk;
        showBoatInfo(sk, pos, b);
        renderFrame();
      });
      dot.addEventListener('mouseover', () => {
        showBoatInfo(sk, pos, b);
      });
      boatG.appendChild(dot);

      // Heading indicator
      const hRad = (pos.hdg - 90) * Math.PI / 180;
      const hx = pp.x + Math.cos(hRad) * (r + 3);
      const hy = pp.y + Math.sin(hRad) * (r + 3);
      const hdgLine = svgEl('line',{x1:pp.x,y1:pp.y,x2:hx,y2:hy,
        stroke:color,'stroke-width':'1',opacity:'0.6'});
      boatG.appendChild(hdgLine);

      // Label when zoomed or selected
      if (zoomLevel > 1.5 || isSelected) {
        const label = svgEl('text',{x:pp.x+r+3,y:pp.y+2,fill:color,'font-size':'5',
          'font-family':'sans-serif','font-weight':isSelected?'bold':'normal',
          'pointer-events':'none'});
        label.textContent = sk;
        boatG.appendChild(label);
      }
    }
  });

  // Update info panel if no specific selection
  if (!selectedBoat) {
    updateRaceSummary(positions);
  }

  updateTimeDisplay();
}

// ========== INFO PANEL ==========
function showBoatInfo(sk, pos, b) {
  selectedBoat = sk;
  const panel = document.getElementById('infoPanel');
  const hrs = Math.floor(currentTimeMin / 60);
  const mins = Math.round(currentTimeMin % 60);
  const elapsed = `${hrs}h${String(mins).padStart(2,'0')}m`;
  const clockTime = raceTimeToClockStr(currentTimeMin);
  const spd = pos.speed || '--';
  const hdg = Math.round(pos.hdg) + '°';
  const status = pos.finished ? 'FINISHED' : (pos.active ? 'RACING' : 'NOT STARTED');

  panel.innerHTML = `
    <span class="info-item"><span class="info-label">Boat:</span>${b.n}</span>
    <span class="info-item"><span class="info-label">Skipper:</span>${sk}</span>
    <span class="info-item"><span class="info-label">Class:</span>${b.c}</span>
    <span class="info-item"><span class="info-label">Speed:</span>${spd} kn</span>
    <span class="info-item"><span class="info-label">Hdg:</span>${hdg}</span>
    <span class="info-item"><span class="info-label">Time:</span>${clockTime}</span>
    <span class="info-item"><span class="info-label">Elapsed:</span>${elapsed}</span>
    <span class="info-item"><span class="info-label">Status:</span>${status}</span>
  `;
}

function showWindInfo(pt, wind) {
  selectedBoat = null;
  const panel = document.getElementById('infoPanel');
  panel.innerHTML = `
    <span class="info-item"><span class="info-label">Wind Point:</span>${pt.id} (${pt.lat.toFixed(2)}, ${pt.lon.toFixed(2)})</span>
    <span class="info-item"><span class="info-label">Speed:</span>${wind.speed.toFixed(1)} kn</span>
    <span class="info-item"><span class="info-label">Direction:</span>${Math.round(wind.dir)}°</span>
    <span class="info-item"><span class="info-label">Gusts:</span>${wind.gust.toFixed(1)} kn</span>
  `;
}

function updateRaceSummary(positions) {
  const panel = document.getElementById('infoPanel');
  const active = positions.filter(p => p.pos.active);
  const finished = positions.filter(p => p.pos.finished);

  // Sort by progress (approximate: how far through waypoints)
  let leaderStr = '--';
  if (active.length > 0) {
    // Rough leader: furthest along waypoints
    let best = null, bestProg = -1;
    active.forEach(p => {
      const pts = p.b.p;
      let prog = 0;
      for (let i = 0; i < pts.length - 1; i++) {
        if (currentTimeMin >= pts[i][0] && currentTimeMin <= pts[i+1][0]) {
          prog = i + (currentTimeMin - pts[i][0]) / (pts[i+1][0] - pts[i][0]);
          break;
        }
        if (currentTimeMin > pts[i][0]) prog = i;
      }
      if (prog > bestProg) { bestProg = prog; best = p; }
    });
    if (best) leaderStr = best.sk + ' (' + best.b.n + ')';
  }

  panel.innerHTML = `
    <span class="info-item"><span class="info-label">Year:</span>${currentYear}</span>
    <span class="info-item"><span class="info-label">Boats:</span>${positions.length}</span>
    <span class="info-item"><span class="info-label">Racing:</span>${active.length}</span>
    <span class="info-item"><span class="info-label">Finished:</span>${finished.length}</span>
    <span class="info-item"><span class="info-label">Leader:</span>${leaderStr}</span>
  `;
}

// ========== TIME/PLAYBACK ==========
// Race starts at 10:00 local (CEST), so timeMin=0 → 10:00
function raceTimeToClockStr(timeMin) {
  const startHour = 10; // 10:00 CEST
  const totalMin = startHour * 60 + timeMin;
  const day = Math.floor(totalMin / 1440); // 0 = Saturday, 1 = Sunday
  const dayMin = totalMin % 1440;
  const h = Math.floor(dayMin / 60);
  const m = Math.round(dayMin % 60);
  const dayLabel = day === 0 ? 'Sat' : 'Sun';
  return dayLabel + ' ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

function updateTimeDisplay() {
  document.getElementById('timeDisplay').textContent = raceTimeToClockStr(currentTimeMin);
}

function updateSlider() {
  document.getElementById('timeSlider').value = Math.round(currentTimeMin);
}

document.getElementById('timeSlider').addEventListener('input', e => {
  currentTimeMin = parseFloat(e.target.value);
  renderFrame();
});

document.getElementById('playBtn').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('playBtn').innerHTML = playing ? '&#10074;&#10074;' : '&#9654;';
  if (playing) {
    lastFrameTime = performance.now();
    animate();
  }
});

document.getElementById('stopBtn').addEventListener('click', () => {
  playing = false;
  currentTimeMin = 0;
  document.getElementById('playBtn').innerHTML = '&#9654;';
  updateSlider();
  renderFrame();
});

document.getElementById('speedSelect').addEventListener('change', e => {
  playSpeed = parseFloat(e.target.value);
});

function animate(ts) {
  if (!playing) return;
  if (!ts) ts = performance.now();

  const dt = (ts - lastFrameTime) / 1000; // seconds
  lastFrameTime = ts;

  // 1x speed = 1 race-minute per second
  currentTimeMin += dt * playSpeed;

  if (currentTimeMin >= maxTimeMin) {
    currentTimeMin = maxTimeMin;
    playing = false;
    document.getElementById('playBtn').innerHTML = '&#9654;';
  }

  updateSlider();
  renderFrame();

  if (playing) {
    animFrame = requestAnimationFrame(animate);
  }
}

// ========== CLICK DESELECT ==========
svg.addEventListener('click', e => {
  if (e.target.tagName === 'svg' || e.target.tagName === 'polygon' || e.target.tagName === 'rect') {
    selectedBoat = null;
    renderFrame();
  }
});

// ========== INIT ==========
function init() {
  // Set default viewbox with some padding
  viewBox = {x: -20, y: -20, w: MAP_W + 40, h: MAP_H + 40};
  defaultVB = {...viewBox};

  initMap();
  buildYearButtons();
  buildLegend();
  fetchWindData(currentYear);
  renderFrame();
}

init();
</script>
